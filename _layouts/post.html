---
layout: default
---
<article class="blog-post">
    <header class="post-header">
        <h1 class="post-title">{{ page.title }}</h1>
        <p class="post-meta">
            Published on: {{ page.date | date: "%B %d, %Y" }} | Category: {{ page.category }}
        </p>
    </header>

    <div class="post-content">
        {{ content }}
    </div>
</article>
