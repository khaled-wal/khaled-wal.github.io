<!-- ═══════════════════════════════════════════════════════════════════════════
     قسم الدعوة للتواصل (CTA) — مكوّن قابل لإعادة الاستخدام
     ─────────────────────────────────────────────────────────────────────────
     الغرض: يظهر في نهاية صفحات دراسات الحالة والمشاريع لتشجيع الزائر
             على التواصل. يدعم العربية والإنجليزية تلقائياً.
     الاستخدام: هذا المكون يستخدم كقسم للتواصل أسفل الصفحات
     التعديل: غيّر النص أدناه أو رابط الزر حسب الحاجة.
     ═══════════════════════════════════════════════════════════════════════════ -->

{% assign current_lang = page.lang | default: 'ar' %}

<!-- حاوية CTA الرئيسية — خلفية متدرجة مع حدود خضراء خفيفة -->
<section class="mkt-cta-section">
    <div class="mkt-cta-inner">

        <!-- أيقونة زخرفية — صاروخ يرمز للانطلاق والنتائج -->
        <div class="mkt-cta-icon" aria-hidden="true">
            <i class="fa-solid fa-rocket"></i>
        </div>

        <!-- العنوان الرئيسي للـ CTA -->
        <h2 class="mkt-cta-heading">
            {% if current_lang == 'en' %}
                Facing a similar challenge?
            {% else %}
                هل تواجه تحدياً مشابهاً؟
            {% endif %}
        </h2>

        <!-- النص الوصفي — يُشجّع الزائر على التواصل -->
        <p class="mkt-cta-text">
            {% if current_lang == 'en' %}
                Let's connect and achieve similar results together.
            {% else %}
                تواصل معي لنحقق نتائج مماثلة.
            {% endif %}
        </p>

        <!-- زر التواصل — يستخدم أنماط btn الموجودة مسبقاً + رابط قسم التواصل -->
            
    </div>
</section>
