title: "Khaled waleed | Marketing Communications student"
description: "Portfolio & Blog"
url: "https://username.github.io"
baseurl: ""

# CV Path
cv_path: "/assets/files/KhaledWaleedCV.pdf"

# Collections
collections:
  case_studies:
    output: true
    permalink: /portfolio/:name/
  projects:
    output: true
    permalink: /projects/:name/

# Defaults
defaults:
  - scope:
      path: ""
    values:
      lang: "ar"
      dir: "rtl"
  - scope:
      path: "en"
    values:
      lang: "en"
      dir: "ltr"
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: case_studies
    values:
      layout: case_study
  - scope:
      path: ""
      type: projects
    values:
      layout: case_study

# Build
markdown: kramdown
permalink: /:year/:month/:day/:title/
