title: "Khaled Hashem | Marketing Communications student"
description: "Portfolio & Blog"
url: "https://khaled-wal.github.io"
baseurl: ""

# ─── EDIT HERE: Your CV PDF path ──────────────────────────────────────────
# Upload your CV file to /assets/files/ and update the filename below
cv_path: "/assets/files/KhaledWaleedCV.pdf"
# ──────────────────────────────────────────────────────────────────────────

# Collections
collections:
  case_studies:
    output: true
    permalink: /portfolio/:name/
  projects:
    output: true
    permalink: /projects/:name/
  lab:
    output: true
    permalink: /lab/:name/

# Defaults
defaults:
  - scope:
      path: ""
    values:
      lang: "ar"
      dir: "rtl"
  - scope:
      path: "en"
    values:
      lang: "en"
      dir: "ltr"
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: case_studies
    values:
      layout: case_study
      lang: "ar"
  - scope:
      path: "en"
      type: case_studies
    values:
      layout: case_study
      lang: "en"
  - scope:
      path: ""
      type: projects
    values:
      layout: project
      lang: "ar"
  - scope:
      path: "en"
      type: projects
    values:
      layout: project
      lang: "en"
  - scope:
      path: ""
      type: lab
    values:
      layout: case_study
      lang: "ar"
  - scope:
      path: "en"
      type: lab
    values:
      layout: case_study
      lang: "en"

# Build settings
markdown: kramdown
permalink: /:year/:month/:day/:title/

# Exclude development files from the _site output
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - "*.sh"
  - vendor/
  - .jekyll-cache/
  - .ruby-lsp/
  - node_modules/
